<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .h { font-family: 'Caveat', cursive; font-weight: 700; fill: #FFFCF5; }
      .accent { fill: #F4C430; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 500; fill: #FFFCF5; opacity: 0.7; letter-spacing: 0.08em; }
      .body { font-family: 'Caveat', cursive; font-weight: 600; fill: #FFFCF5; opacity: 0.9; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="#0E0E0E"/>
  <rect x="40" y="40" width="1120" height="550" rx="32" fill="none" stroke="#F4C430" stroke-width="3" stroke-dasharray="2 10"/>

  <g transform="translate(100, 180)">
    <text x="0" y="0" class="mono" font-size="28">A FREE TOOL FOR HOME GAMES</text>
    <text x="0" y="120" class="h" font-size="160">
      <tspan class="accent">♠</tspan> PokerTools
    </text>
    <text x="0" y="220" class="body" font-size="48">Track buy-ins. Time the blinds.</text>
    <text x="0" y="280" class="body" font-size="48">Settle up after the night.</text>
    <text x="0" y="380" class="mono" font-size="22">NO SIGN-UP &#8212; OPEN IT AND USE IT</text>
  </g>
</svg>
